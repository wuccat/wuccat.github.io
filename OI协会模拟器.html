*{box-sizing:border-box;margin:0;padding:0}
:root{

}
body.light{
  --bg:#eef4ff;--bg2:#ffffff;--panel:#f8fbff;--panel2:#edf4ff;--line:#cfdcf1;

body{background:radial-gradient(circle at top,var(--bg2),var(--bg) 45%);color:var(--text);font-family:"Courier New","Fira Code",monospace;min-height:100vh;line-height:1.6}
button,input,select{font:inherit}
button{cursor:pointer;border:none}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}
#app{min-height:100vh}
.header{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--panel),var(--panel2));border-bottom:1px solid var(--line);padding:10px 18px;backdrop-filter:blur(8px)}
.stat-bar{display:flex;gap:8px;flex-wrap:wrap;padding:8px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
.tabs{display:flex;gap:4px;overflow:auto;padding:6px 14px;border-bottom:1px solid var(--line)}
.tab{padding:8px 12px;border-radius:10px 10px 0 0;background:transparent;color:var(--dim);font-weight:700}
.tab.active{background:var(--panel);color:var(--acc);border:1px solid var(--line);border-bottom-color:var(--panel)}
.main{max-width:1600px;margin:0 auto;padding:16px}
.dashboard{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;align-items:start}
.sidecol{position:sticky;top:124px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
.grid{display:grid;gap:10px}.grid-auto{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.flex{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 14px;border-radius:10px;font-weight:800;font-size:13px;box-shadow:var(--shadow)}
.btn-dis{opacity:.42;cursor:not-allowed!important;background:var(--line)!important;color:var(--dim)!important;box-shadow:none!important}
.inp{background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:8px 10px;width:96px;text-align:center}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
.progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden}.progress>div{height:100%;border-radius:999px}
.warn-bar{background:rgba(255,155,84,.12);border-bottom:1px solid rgba(255,155,84,.22);padding:8px 18px}
.matchCard{min-height:180px;cursor:pointer}
.story{background:linear-gradient(180deg,rgba(0,221,179,.08),rgba(86,166,255,.05));border:1px solid rgba(0,221,179,.16);border-radius:14px;padding:12px;margin-bottom:10px}
.details-grid{display:grid;grid-template-columns:160px 1fr;gap:6px 12px;font-size:13px}
.mono-dim{color:var(--dim)}
.news-card{border-left:4px solid;border-radius:14px;padding:14px;background:var(--bg2);margin-bottom:8px}
.bottom-log{margin-top:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:18px;z-index:100}.modal{max-width:980px;width:100%;max-height:84vh;overflow:auto;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}
.tip{position:relative}.tip:hover::after{content:attr(data-tip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 8px);background:var(--bg2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 10px;min-width:180px;max-width:320px;white-space:normal;font-size:12px;z-index:200;box-shadow:var(--shadow)}
.guide-focus{position:relative;z-index:220;outline:3px solid var(--gold);box-shadow:0 0 0 9999px rgba(0,0,0,.45)!important;border-radius:12px}
.guide-bubble{position:fixed;z-index:230;max-width:340px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
summary{list-style:none} summary::-webkit-details-marker{display:none}
.comp-detail summary{cursor:pointer;font-weight:900;color:var(--acc);display:flex;align-items:center;gap:6px}
.comp-detail[open] summary{margin-bottom:10px}
@media (max-width:1100px){.dashboard{grid-template-columns:1fr}.sidecol{position:static}}

const TUTORIAL_PAGES=[
{title:"欢迎来到后CCF时代",body:"📋 目标：用十年让信息学竞赛重新被信任。\n\n你拥有一笔启动资金和一些行动点(AP)。十年后，你的成绩将从声誉、财务、参赛规模、监督体系、稳定性等维度综合评分，满分1000分。\n\n⚠️ 前半年是「隐形观察期」——比赛可以办，但口碑不会变动。这段时间是练手机会，不要浪费。",selector:"#logoBtn"},
{title:"五大资源一览",body:"💰 资金：每月扣除评测维护费和特派薪资。举办比赛会产生收支差额（可能亏损）。\n\n⚡ 行动点(AP)：解锁比赛/晋级线/楼层的货币。每月自动增加，声誉越高、楼层越多，涨得越快。\n\n⭐ 声誉：口碑值。决定自然报名人数、每月AP增速和高级赛事解锁条件。每月会自然小幅下跌，资金过多也会压声誉。\n\n🖥️ 评测机：算力决定能否举办高难度比赛。算力不足会直接翻车。\n\n🕵️ 特派员：核心监督力量。每月稳定增加声誉，比赛结束后额外加成。",selector:".stat-bar"},
{title:"行动点(AP)怎么花",body:"⚡ AP是游戏最紧张的资源，管理好它是胜负关键。\n\n花在哪里：\n• 解锁新比赛：层级越高消耗越多\n• 添加晋级线：每条固定消耗\n• 给比赛添加楼层：视楼层类型而定\n\n每月获得：基础值 + 声誉加成 + 楼层累积加成\n\n💡 声誉越高每月AP涨得越快；楼层累积越多也会加速AP回收——前期多花AP加楼层，后期会有回报。",selector:".stat-bar"},
{title:"声誉：最重要的数字",body:"⭐ 声誉是整个游戏的核心驱动力。\n\n声誉影响什么：\n• 参赛人数基数（声誉越高自然来的人越多）\n• 每月AP增速\n• 解锁高级赛事（国家队系列和IOI需要较高声誉才会开放）\n• 最终评分中占最大权重\n\n声誉怎么涨：\n✅ 办高质量比赛（出题质量高、培训充分、好楼层）\n✅ 雇佣特派员（每月稳定增加）\n✅ 添加开幕式/直播/颁奖等活动楼层\n\n声誉怎么掉：\n❌ 题目质量差、翻车、未培训出赛\n❌ 资金过于充裕会触发「富而不仁」缓慢衰减\n❌ 每月自然小幅衰减",selector:".stat-bar"},
{title:"第一步：解锁并配置比赛",body:"🏁 在「比赛」标签页，点击「可创建比赛」下的按钮，消耗AP解锁一场比赛。\n\n解锁后需配置四件事：\n① 开赛月：选择比赛举办月份。避免同月多场撞期。\n② 收费：中等偏低的收费是吸引参赛的甜点区；定价过高人数会锐减；免费最吸引人但收入有限。\n③ 考点数：越多考点参赛越多，但成本也涨。注意每个比赛有考点上限。\n④ 楼层：见下一页。\n\n💡 建议路线：CSJ-P初赛 → CSJ-P → NOIP → NOI，是最稳的入门链路。",selector:".tabs"},
{title:"楼层：定义比赛个性",body:"🏗️ 点击「+楼层」为比赛添加选项。\n\n六大类型：\n⏱️ 时间类（互斥）：标准/加时/闪电，影响挂分率和口碑\n📋 赛制类（互斥）：OI默认有一定挂分率；IOI赛制挂分归零，但需要更多AP和资金\n🎪 活动类：开幕式/直播/颁奖/讲题等，显著加声誉和参赛人数\n📚 题目类：加量/简单/困难题集，影响参赛基数和品牌\n🏛️ 设施类：网络/餐饮/T恤/豪华场地，减少异常、提升口碑\n⭐ 特殊类：特邀选手（大幅加声誉）、企业赞助（不花钱还能获得资金）\n\n💡 NOI/夏令营/国家队集训/IOI上，开幕式+直播+颁奖的组合有额外加成，非常值得。",selector:".tabs"},
{title:"出题系统：质量决定口碑",body:"📝 点击「题目」按钮进入题目配置面板。每场比赛需要将所有题目分配给出题人。\n\n出题人属性：\n• 实力(sk)：决定题目难度上限\n• 质量(qu)：影响题目最终质量，越高越好\n• 容量(cap)：一人最多出几道题\n\n质量的重要性：\n• 比赛层级越高，对平均质量的要求越高\n• 质量不达标会直接拖累口碑；质量出色则是保口碑的核心\n• 出题人质量差异较大时，高tier赛事优先让最优秀的出题人上\n\n💡「自动分配」会按质量从高到低自动匹配。验题（消耗少量资金）可消除超纲/冷门标签，高tier比赛强烈建议验题。",selector:".tabs"},
{title:"培训：不培训=在赌命",body:"🎓 在比赛详情页，出题完成后点击「组织培训」。有基础/标准/高级三档。\n\n为什么一定要培训：\n✅ 已培训：比赛正常进行，获得口碑加成\n❌ 未培训：大概率出现监考尺度不统一、考场流程混乱、申诉量激增等异常，这些都会损害口碑\n\n培训成本随考点数成比例增加。\n\n⚠️ 注意：扩大考点数后需要重新培训！培训只对当时的考点数有效。\n\n高级别赛事（国家队系列/IOI）培训加成更高，强烈建议用高级培训。",selector:".tabs"},
{title:"晋级线：连接成体系",body:"🧭 点击「晋级线」标签页配置选手晋级路径。\n\n晋级线决定什么：\n• 下一场比赛的初始参赛人数（= 上场参赛人数 × 通过率）\n• 收费和层级衔接合理时有额外吸引力加成\n\n关键设置：\n• 通过率：中等偏低的通过率有额外参赛加成，过高或过低都不理想\n• 收费：中等偏低的定价最优，过高减少下场报名\n• 层级差：相差一两级最自然；跨度过大会有惩罚\n\n⚠️ NOI、夏令营、国家队选拔有最低晋级线层级要求。没有符合要求的晋级线，这些比赛根本无法举办！",selector:".tabs"},
{title:"晋级线体系设计建议",body:"🗺️ 好的体系设计示意：\n\nCSJ-P初赛 → CSJ-P → NOIP → NOI\nCSS-P复赛 → CSS-P → 省选 → NOI\n\n为什么这样好：\n✅ 每条链路层级差均匀，不会有惩罚\n✅ 大多数比赛都能通过晋级线到达NOI（体系连贯性加分）\n✅ 各条线层级差接近，全局一致性加分\n\nWC冬令营和夏令营可以作为NOI后的支线，不影响主链路。\n\n💡 晋级线体系在最终评分中有一定权重，但对参赛人数的影响更是立竿见影。设计好晋级线往往比任何楼层都更有价值。",selector:".tabs"},
{title:"评测机：算力门槛",body:"⚙️ 在「评测」标签页管理评测环境。\n\n每个比赛都有最低算力要求，层级越高要求越高。评测页面会直接显示当前评测机能支撑哪些比赛。\n\n升级路线参考：\n• 刚开始：树莓派集群连初级赛事都撑不住，要尽快升级\n• 中期：工作站级别才能举办中高级赛事\n• 后期：NOI及以上需要高性能服务器乃至数据中心级别\n\n💡 必须在办赛前升级！算力不足直接触发翻车。升级费用不菲，提前攒钱规划。",selector:".tabs"},
{title:"特派员：长期信任的基础",body:"🕵️ 特派员是游戏中最稳定的口碑来源。\n\n特派员每月效果：\n• 根据能力和尽职属性，每月持续增加口碑\n• 比赛结束后还会额外给出加成\n\n雇佣成本 = 一次性雇佣费 + 每月月薪。能力和尽职越高，效果越好，薪资也越高。\n\n雇佣时机：游戏前期就应该雇一两个初级特派员打底。到中期，建立起一支稳定的特派员队伍，能让声誉在办赛之外也持续增长。\n\n特派员体系在最终评分中有专项权重。",selector:".tabs"},
{title:"随机事件：保持警惕",body:"🎲 游戏进行中，每隔一段时间会触发随机事件，包括：\n\n好事：企业赞助联络 💼、知名选手好评 🌟、高校合作 🎓、国际会议邀请 🏆\n\n坏事：舆论风波 📱、数据异常曝光 ⚠️、设备故障维修 🔧\n\n有些事件同时带来资金和口碑变化，有些则需要取舍。\n\n💡「数据异常曝光」是最致命的随机惩罚，特派员可以一定程度上降低其后续影响。平时维持充足的资金缓冲，是应对随机事件的最好方式。",selector:".sidecol"},
{title:"最终评分：十年后怎么算",body:"🏆 十年后，你的表现从以下维度综合评分：\n\n① 声誉——最重要的单项，权重最高\n② 财务健康——资金充足有加分，长期亏损有惩罚\n③ 参赛规模——累计参赛总人次\n④ 监督体系——特派员队伍的整体能力\n⑤ 稳定性——每场比赛口碑变化是否平稳\n⑥ 执行质量——有多少场比赛既培训了又没有出异常\n⑦ 高阶赛事——国选/集训/IOI是否建立\n⑧ 晋级线体系——体系连贯性与层级一致性\n\n得分够高达成GOOD ENDING；中等为NEUTRAL；否则BAD。",selector:".sidecol"},
{title:"十条实战建议",body:"💡 快速上手要点：\n\n1. 第一年先办初级赛事，回收资金再升级评测机\n2. 尽早升级评测机，否则中高级赛事无法举办\n3. 晋级线通过率用默认值即可，默认已接近最优\n4. 不要让两场比赛同月开赛——会相互分流\n5. 每场比赛都培训！哪怕基础培训也比不培训强得多\n6. IOI前必须先建立国家队选拔和国家队集训（各需一定声誉）\n7. 企业赞助楼层不花AP也不花钱还能获得资金，性价比极高\n8. 声誉到一定程度后开始认真建立晋级线体系，参赛人数会显著提升\n9. 开赛前看预警条，它会提示你哪场比赛没准备好\n10. 资金过于充裕后声誉会缓慢下降，可以投资升级评测机或添加楼层来消耗",selector:".bottom-log"}

function mkS(){var nm=SN[Ru(0,SN.length-1)]+Ru(10,99),sk=Ru(2,10),qu=Ru(2,10),cap=Ru(2,5);var cost=Math.round((sk*150+qu*200+cap*120)*(.85+Math.random()*.3));var probPrice=Math.round((sk*25+qu*40)*(.8+Math.random()*.4));var contractFee=Math.round(cost*1.8);return{id:uid(),nm:nm,sk:sk,qu:qu,cap:cap,used:0,cost:cost,probPrice:probPrice,contractFee:contractFee,monthlyLimit:cap,asgn:[]}}
function mkI(){var nm=IN[Ru(0,IN.length-1)]+Ru(10,99),lv=Ru(0,3),ab=cl(lv*2+Ru(1,3),1,10),dil=cl(lv*2+Ru(0,3),1,10),sal=Math.round((ab*120+dil*80+lv*400)*(.9+Math.random()*.2));return{id:uid(),nm:nm,lv:lv,title:IT[lv],ab:ab,dil:dil,sal:sal,hire:sal*5}}
function getComp(id){return COMPS.find(function(c){return c.id===id})||(G&&G.customDefs?G.customDefs.find(function(c){return c.id===id}):null)||null}
function cSt(tw){

  (tw.floors||[]).forEach(function(f){var e=f.fx||{};if(e.hangR!==undefined)hangR=e.hangR;if(e.timeM)timeM=e.timeM;if(e.solvB)solvB+=e.solvB;if(e.repB)repB+=e.repB;if(e.partM)partM*=e.partM;if(e.diffM)diffM+=e.diffM;if(e.extraP)extraP+=e.extraP;if(e.hangM)hangM*=e.hangM;if(e.repMul)repMul*=e.repMul;if(e.moneyB)moneyB+=e.moneyB});
  var def=getComp(tw.id);

  return {hangR:hangR,timeM:timeM,solvB:solvB,repB:repB,partM:partM,diffM:diffM,extraP:extraP,hangM:hangM,repMul:repMul,moneyB:moneyB,totP:tw.bp+extraP,effD:cl(tw.bd+diffM,1,10),maxSites:def?def.maxSites:50,minLineTier:def?def.minLineTier:-1,unlockRep:def?def.unlockRep||0:0}
}
function priceParticipationMultiplier(fee){
  if(fee<=100) return cl(1+(100-fee)*0.0022,1,1.22);
  if(fee<=500) return cl(1-(fee-100)*0.00025,0.9,1.0);
  var mult=0.9*Math.exp(-(fee-500)/1500);
  return cl(mult,0.003,0.9)
}
function hasRequiredLine(tid,lines,matches){var def=getComp(tid);if(!def||def.minLineTier<0)return true;return lines.some(function(l){return l.to===tid&&matches[l.from]&&matches[l.from].tier>=def.minLineTier})}
function lineContinuityToNOI(matchId,lines,matches,visited){
  if(matchId==="noi") return true;
  visited=visited||{};
  if(visited[matchId]) return false;
  visited[matchId]=true;
  var nexts=lines.filter(function(l){return l.from===matchId}).map(function(l){return l.to});
  for(var i=0;i<nexts.length;i++){
    if(lineContinuityToNOI(nexts[i],lines,matches,Object.assign({},visited))) return true;
  }
  return false;
}
function progressionLineBonus(tid,lines,matches){
  var target=matches[tid];
  if(!target) return 1;
  var incoming=lines.filter(function(l){return l.to===tid&&matches[l.from]});
  if(!incoming.length) return 1;
  var best=1;
  incoming.forEach(function(line){
    var from=matches[line.from];
    var gap=target.tier-from.tier;
    var bonus=1;
    if(gap===1) bonus+=0.14;
    else if(gap===2) bonus+=0.11;
    else if(gap===3) bonus+=0.06;
    else bonus-=0.05;
    if(line.pass>=0.52&&line.pass<=0.72) bonus+=0.04;
    if(line.price>=60&&line.price<=140) bonus+=0.03;
    if(lineContinuityToNOI(line.from,lines,matches)) bonus+=0.03;
    best=Math.max(best,bonus);
  });
  return cl(best,0.9,1.21)
}
function lineDistancePenalty(lines,matches){
  if(lines.length<=1) return 1;
  var gaps=[];
  lines.forEach(function(l){if(matches[l.from]&&matches[l.to]) gaps.push(Math.abs(matches[l.to].tier-matches[l.from].tier))});
  if(!gaps.length) return 1;
  var avg=gaps.reduce(function(a,b){return a+b},0)/gaps.length;
  var variance=gaps.reduce(function(s,g){return s+(g-avg)*(g-avg)},0)/gaps.length;
  return cl(1-Math.min(0.12,variance*0.03),0.88,1)
}
function pathToNOIExistsFromAll(lines,matches){
  return Object.keys(matches).every(function(id){
    if(id==="camp") return true;
    return lineContinuityToNOI(id,lines,matches,{});
  })
}
function estP(tw,rep,lines,matches){
  var st=cSt(tw),line=lines.find(function(l){return l.to===tw.id}),base;
  if(tw.tier<=1) base=Math.round(40+3.2*rep-st.effD*3);

  else base=Math.round(15+2.5*rep-st.effD*2);
  if(!hasRequiredLine(tw.id,lines,matches)) base=Math.round(base*0.1);
  var fee=line?line.price:(tw.regPrice||50),pe=priceParticipationMultiplier(fee),lineBonus=progressionLineBonus(tw.id,lines,matches),coherence=lineDistancePenalty(lines,matches);
  var cap=(tw.id==="noi"||tw.id==="camp"||tw.id==="team_camp")?400:1e9;
  return Math.max(5,Math.min(cap,Math.round(base*pe*lineBonus*coherence*st.partM*(1+((tw.sites||1)-1)*.15))))
}
function epRange(ep){
  var lo=Math.round(ep*0.7/10)*10,hi=Math.round(ep*1.3/10)*10;

}
function floorMaintCost(f,tw){

  var sites=tw?tw.sites||1:1;

}
function compCost(tw,part){var s=tw.sites||1,fixed=s*600,variable=part*20,bo=tw.board?part*280:0;return{pr:fixed,vr:variable,vo:0,se:0,bo:bo,total:fixed+variable+bo}}
function trainCost(base,sites){return Math.round(base*(1+(sites-1)*.4))}

function calcEnd(g){
  var tp=g.results.reduce(function(s,r){return s+r.part},0),rs=cl(g.rep/75,0,1),ms=cl(g.money/120000,-.2,.45),ps=cl(tp/4500,0,1),is=cl(g.inspectors.reduce(function(s,i){return s+i.ab},0)/24,0,.28),ran=g.results.length,avgRep=ran?g.results.reduce(function(s,r){return s+r.repCh},0)/ran:0,stability=cl((avgRep+6)/12,0,1),prepOk=0,totalEvents=0;
  Object.keys(g.towers).forEach(function(k){var t=g.towers[k];if(t.lastResult)totalEvents++;if(t.lastResult&&!t.lastResult.noTrainingRisk&&!(t.lastResult.abnormalEvents&&t.lastResult.abnormalEvents.length))prepOk++});
  var prepScore=totalEvents?prepOk/totalEvents:0.5,eliteBuilt=["team_select","team_camp","ioi"].filter(function(id){return !!g.towers[id]}).length/3;
  var coherence=lineDistancePenalty(g.lines,g.towers);

  var covered=towerIds.length?towerIds.filter(function(id){return lineContinuityToNOI(id,g.lines,g.towers,{})}).length/towerIds.length:0;
  var lineScore=towerIds.length===0?0.5:cl(0.3+covered*.7,0.3,1);

  var passScore=g.lines.length?g.lines.filter(function(l){return l.pass>=0.28&&l.pass<=0.82}).length/g.lines.length:0.5;
  // tier-gap quality: lines where tier gap is 1–3 (ideal ladder)
  var gapScore=g.lines.length?g.lines.filter(function(l){var gap=g.towers[l.to]&&g.towers[l.from]?Math.abs(g.towers[l.to].tier-g.towers[l.from].tier):99;return gap>=1&&gap<=3}).length/g.lines.length:0.5;
  var lineQuality=cl(lineScore*.45+coherence*.25+passScore*.15+gapScore*.15,0,1);
  var c=rs*.23+ms*.06+ps*.14+is*.09+stability*.11+prepScore*.09+eliteBuilt*.07+lineQuality*.21;
  return {c:c,tp:tp,detail:{rep:rs,money:ms,participation:ps,inspectors:is,stability:stability,execution:prepScore,elite:eliteBuilt,lineScore:lineScore,coherence:coherence,passScore:passScore,gapScore:gapScore,lineQuality:lineQuality}}
}

  FCATS.forEach(function(cat){var floors=FLOORS.filter(function(f){return f.cat===cat.id}),hasCat=(t.floors||[]).some(function(f){return f.cat===cat.id});inner+='<div style="margin-bottom:16px"><div style="font-size:15px;font-weight:900;color:'+cat.c+';margin-bottom:8px">'+cat.name+(cat.ex&&hasCat?' <span style="font-size:12px;color:var(--dim)">（本类互斥）</span>':'')+'</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">';floors.forEach(function(f){var owned=eids.indexOf(f.id)>=0,blocked=cat.ex&&hasCat,dis=owned||blocked||G.ap<f.ap||G.money<f.cost;inner+='<div class="floorOpt'+(dis?' btn-dis':'')+'" data-fid="'+f.id+'" style="padding:10px;border-radius:12px;background:'+(dis?'var(--bg2)':cat.c+'08')+';border:1px solid '+(dis?'var(--line)':cat.c+'30')+';cursor:'+(dis?'not-allowed':'pointer')+';opacity:'+(dis?0.35:1)+'"><div style="font-weight:900;font-size:13px;margin-bottom:3px">'+f.icon+' '+f.name+'</div><div style="font-size:12px;color:var(--dim);margin-bottom:4px">'+f.desc+'</div><div style="font-size:12px;color:var(--gold);margin-bottom:4px">'+f.formal+'</div><div style="font-size:12px;color:'+cat.c+'">'+(f.ap>0?'AP '+f.ap+' ':'')+(f.cost>0?'¥'+f.cost:'')+((!f.ap&&!f.cost)?'免费':'')+(f.cat==='fac'||f.cat==='evt'?' | 维护随规模增长':'')+'</div></div>'});inner+='</div></div>'});inner+='</div>';

}
